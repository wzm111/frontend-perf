name: Frontend Performance Diagnosis

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.*'
      - 'next.config.*'
      - 'webpack.config.*'
      - 'nuxt.config.*'
      - 'astro.config.*'
      - 'svelte.config.*'
      - 'remix.config.*'
      - '.github/workflows/frontend-perf.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/**'
      - 'package.json'
      - 'vite.config.*'
      - 'next.config.*'
      - 'webpack.config.*'
      - 'nuxt.config.*'
      - 'astro.config.*'
      - 'svelte.config.*'
      - 'remix.config.*'
  workflow_dispatch:
    inputs:
      target_dir:
        description: 'Target directory to analyze (use . for root)'
        required: false
        default: '.'
      verify:
        description: 'Run post-build verification'
        required: false
        default: 'true'
      serve:
        description: 'Start preview server'
        required: false
        default: 'false'
      json_output:
        description: 'Output JSON report'
        required: false
        default: 'false'

jobs:
  diagnose:
    name: Performance Diagnosis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
        if: hashFiles('package-lock.json') != ''

      - name: Setup Node.js (yarn)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
        if: hashFiles('yarn.lock') != ''

      - name: Setup Node.js (pnpm)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
        if: hashFiles('pnpm-lock.yaml') != ''

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9
        if: hashFiles('pnpm-lock.yaml') != ''

      - name: Install dependencies
        run: |
          if [ -f "pnpm-lock.yaml" ]; then pnpm install
          elif [ -f "yarn.lock" ]; then yarn install --frozen-lockfile
          elif [ -f "package-lock.json" ]; then npm ci
          else npm install
          fi

      - name: Build project (if build script exists)
        run: |
          if [ -f "package.json" ] && node -e "
            const pkg = require('./package.json');
            if (pkg.scripts && pkg.scripts.build) process.exit(0);
            process.exit(1);
          " 2>/dev/null; then
            echo "Running build..."
            if [ -f "pnpm-lock.yaml" ]; then pnpm run build
            elif [ -f "yarn.lock" ]; then yarn build
            else npm run build
            fi
          else
            echo "No build script found, skipping build"
          fi
        continue-on-error: true

      - name: Install Chrome (for Lighthouse)
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser
        continue-on-error: true

      - name: Install frontend-perf skill
        run: |
          mkdir -p ~/.claude/skills
          if [ ! -d "~/.claude/skills/frontend-perf" ]; then
            git clone --depth 1 https://github.com/wzm111/frontend-perf.git ~/.claude/skills/frontend-perf || \
            git clone --depth 1 git@github.com:wzm111/frontend-perf.git ~/.claude/skills/frontend-perf
          fi

      - name: Run Performance Diagnosis
        run: |
          TARGET_DIR="${{ github.event.inputs.target_dir || '.' }}"
          ARGS=""

          if [ "${{ github.event.inputs.verify }}" = "true" ]; then
            ARGS="$ARGS --verify"
          fi
          if [ "${{ github.event.inputs.serve }}" = "true" ]; then
            ARGS="$ARGS --serve"
          fi
          if [ "${{ github.event.inputs.json_output }}" = "true" ]; then
            ARGS="$ARGS --json"
          fi

          bash ~/.claude/skills/frontend-perf/scripts/frontend-perf.sh "$TARGET_DIR" $ARGS || true
        continue-on-error: true

      - name: Upload JSON report (if generated)
        uses: actions/upload-artifact@v4
        if: always() && (github.event.inputs.json_output == 'true')
        with:
          name: frontend-perf-report
          path: frontend-perf-report.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## 📊 Frontend Performance Diagnosis\n\n';

            // Try to read JSON report
            if (fs.existsSync('frontend-perf-report.json')) {
              const report = JSON.parse(fs.readFileSync('frontend-perf-report.json', 'utf8'));
              body += `**Project:** ${report.project || 'N/A'}\n`;
              body += `**Framework:** ${report.framework || 'N/A'}\n`;
              body += `**Build Tool:** ${report.build_tool || 'N/A'}\n`;
              body += `**Issues Found:** ${report.summary?.total_issues || 0}\n`;
              body += `**Overall Score:** ${report.summary?.score || 'N/A'}\n\n`;

              if (report.issues && report.issues.length > 0) {
                body += '### 🔴 Critical Issues\n\n';
                report.issues
                  .filter(i => i.severity === 'critical')
                  .forEach(i => {
                    body += `- **${i.category}**: ${i.message} (${i.file || ''})\n`;
                  });

                body += '\n### 🟡 Warnings\n\n';
                report.issues
                  .filter(i => i.severity === 'warning')
                  .forEach(i => {
                    body += `- **${i.category}**: ${i.message} (${i.file || ''})\n`;
                  });
              }
            } else {
              body += 'Performance diagnosis completed. See workflow logs for detailed output.\n';
            }

            body += '\n---\n*Powered by [frontend-perf](https://github.com/wzm111/frontend-perf)*';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
        continue-on-error: true
